<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>J7 FF EXTERNAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="floating-panel" id="mainPanel">
    <div class="icon-minimized" id="expandBtn">J7</div>
    
    <div class="panel-header" id="header">
        <h2>J7 FF - EXCLUSIVE</h2>
        <div class="btn-minimize" id="minBtn">−</div>
    </div>

    <div class="content">
        <div class="player-info">
            <div class="info-text">
                <div>USER</div>
                <div id="displayId">id</div>
            </div>
            <div class="status-dot">ON</div>
        </div>

        <div class="control-row">
            <span class="label">Auto Aimbot</span>
            <label class="switch">
                <input type="checkbox" id="aimbot">
                <span class="slider"></span>
            </label>
        </div>

        <div class="control-row">
            <span class="label">Forçar Headshot</span>
            <label class="switch">
                <input type="checkbox" id="forceHs">
                <span class="slider"></span>
            </label>
        </div>

        <div class="range-container">
            <div class="range-header">
                <span>Distância FOV</span>
                <span id="fovVal">0</span>
            </div>
            <input type="range" id="fovInput" min="0" max="360" value="0">
        </div>

        <div class="footer">
            1.0.0v | @J7_FF (FIZ PRA VC MEU AMIGO)
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
    </html>
