<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HS NOBRU J7 FF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: transparent;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
        }

        .floating-panel {
            position: fixed;
            top: 15%;
            left: 10%;
            width: 300px;
            background: rgba(12, 12, 20, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 40, 40, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            z-index: 10000;
            transition: width 0.3s, height 0.3s, border-radius 0.3s;
            overflow: hidden;
        }

        .floating-panel.minimized {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #ff3a3a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel-header {
            padding: 15px;
            background: rgba(255, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: move;
            border-bottom: 1px solid rgba(255, 40, 40, 0.2);
        }

        .panel-header h2 {
            font-size: 1rem;
            color: #ff4d4d;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .btn-minimize {
            width: 28px;
            height: 28px;
            background: #1a1a2e;
            border: 1px solid #ff3a3a;
            color: #fff;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }

        .content {
            padding: 15px;
        }

        .player-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #ff3a3a;
        }

        .info-text div:first-child {
            font-size: 0.65rem;
            color: #888;
        }

        .info-text div:last-child {
            font-family: monospace;
            color: #eee;
            font-weight: bold;
        }

        .status-dot {
            font-size: 0.7rem;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            padding: 4px 8px;
            border-radius: 20px;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .label {
            color: #ddd;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .switch {
            position: relative;
            width: 46px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2a2a3a;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #ff3a3a; }
        input:checked + .slider:before { transform: translateX(22px); }

        .range-container {
            margin-top: 5px;
        }

        .range-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #bbb;
            font-size: 0.8rem;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 4px;
            background: #2a2a3a;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #ff3a3a;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(255, 58, 58, 0.5);
        }

        .footer {
            text-align: center;
            font-size: 0.6rem;
            color: #555;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .icon-minimized {
            display: none;
            font-weight: bold;
            color: white;
            font-size: 24px;
        }

        .floating-panel.minimized .icon-minimized { display: block; }
        .floating-panel.minimized .panel-header, 
        .floating-panel.minimized .content { display: none; }
    </style>
</head>
<body>

<div class="floating-panel" id="mainPanel">
    <div class="icon-minimized">H</div>
    
    <div class="panel-header" id="header">
        <h2>Nobru J7 VIP</h2>
        <div class="btn-minimize" id="minBtn">−</div>
    </div>

    <div class="content">
        <div class="player-info">
            <div class="info-text">
                <div>PLAYER ID</div>
                <div id="displayId">CARRREGANDO...</div>
            </div>
            <div class="status-dot">ATIVO</div>
        </div>

        <div class="control-row">
            <span class="label">Auto Aimbot</span>
            <label class="switch">
                <input type="checkbox" id="aimbot">
                <span class="slider"></span>
            </label>
        </div>

        <div class="control-row">
            <span class="label">Forçar HS</span>
            <label class="switch">
                <input type="checkbox" id="forceHs">
                <span class="slider"></span>
            </label>
        </div>

        <div class="range-container">
            <div class="range-header">
                <span>Campo de Visão (FOV)</span>
                <span id="fovVal" style="color: #ff3a3a;">0</span>
            </div>
            <input type="range" id="fovInput" min="0" max="360" value="0">
        </div>

        <div class="footer" style="margin-top: 20px;">
            v1.0.4 | DESENVOLVIDO PARA J7 SERIES
        </div>
    </div>
</div>

<script>
    const panel = document.getElementById('mainPanel');
    const header = document.getElementById('header');
    const minBtn = document.getElementById('minBtn');
    const fovInput = document.getElementById('fovInput');
    const fovVal = document.getElementById('fovVal');
    const displayId = document.getElementById('displayId');

    let isDragging = false;
    let currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

    // Gerar ID Aleatório
    displayId.innerText = "NB-" + Math.floor(Math.random() * 900000 + 100000);

    // Sistema de Arraste
    function dragStart(e) {
        if (panel.classList.contains('minimized') && e.type === 'mousedown') return;
        
        let clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
        let clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;

        initialX = clientX - xOffset;
        initialY = clientY - yOffset;

        if (e.target === header || e.target === panel || panel.classList.contains('minimized')) {
            isDragging = true;
        }
    }

    function dragEnd() {
        isDragging = false;
    }

    function drag(e) {
        if (isDragging) {
            e.preventDefault();
            let clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
            let clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;

            currentX = clientX - initialX;
            currentY = clientY - initialY;

            xOffset = currentX;
            yOffset = currentY;

            setTranslate(currentX, currentY, panel);
        }
    }

    function setTranslate(xPos, yPos, el) {
        el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`;
    }

    // Eventos de Arraste
    panel.addEventListener("touchstart", dragStart, {passive: false});
    window.addEventListener("touchend", dragEnd);
    window.addEventListener("touchmove", drag, {passive: false});

    panel.addEventListener("mousedown", dragStart);
    window.addEventListener("mouseup", dragEnd);
    window.addEventListener("mousemove", drag);

    // Minimizar
    function toggleMin() {
        panel.classList.toggle('minimized');
    }

    minBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleMin();
    });

    panel.addEventListener('click', () => {
        if (panel.classList.contains('minimized')) toggleMin();
    });

    // Funções de Controle
    fovInput.addEventListener('input', (e) => {
        fovVal.innerText = e.target.value;
    });

    document.getElementById('aimbot').addEventListener('change', (e) => {
        console.log("Aimbot:", e.target.checked);
    });

    document.getElementById('forceHs').addEventListener('change', (e) => {
        console.log("ForceHS:", e.target.checked);
    });
</script>

</body>
  </html>
